<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--vena-marfil-digital); }
  .row { display: grid; grid-template-columns: 60px 1fr 80px; align-items: center; gap: 14px; padding: 6px 0; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--vena-coral-accion); font-weight: 600; letter-spacing: 0.06em; }
  .bar { height: 12px; background: var(--vena-azul-noche); border-radius: 4px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); text-align: right; }
</style></head>
<body>
  <div class="row"><span class="label">space-1</span><div class="bar" style="width:4px"></div><span class="meta">4 px</span></div>
  <div class="row"><span class="label">space-2</span><div class="bar" style="width:8px"></div><span class="meta">8 px</span></div>
  <div class="row"><span class="label">space-3</span><div class="bar" style="width:12px"></div><span class="meta">12 px</span></div>
  <div class="row"><span class="label">space-4</span><div class="bar" style="width:16px"></div><span class="meta">16 px</span></div>
  <div class="row"><span class="label">space-5</span><div class="bar" style="width:24px"></div><span class="meta">24 px</span></div>
  <div class="row"><span class="label">space-6</span><div class="bar" style="width:32px"></div><span class="meta">32 px</span></div>
  <div class="row"><span class="label">space-7</span><div class="bar" style="width:48px"></div><span class="meta">48 px</span></div>
  <div class="row"><span class="label">space-8</span><div class="bar" style="width:64px"></div><span class="meta">64 px</span></div>
  <div class="row"><span class="label">space-9</span><div class="bar" style="width:96px"></div><span class="meta">96 px</span></div>
</body></html>
