<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><title>Logo versions</title>
<link rel="stylesheet" href="../ui_kits/shared/components.css">
<style>
  body { padding: 24px; background: var(--vena-marfil-digital); margin: 0; font-family: 'DM Sans'; }
  .grid { display: grid; grid-template-columns: 1.2fr 1fr 0.8fr; gap: 14px; }
  .cell { border-radius: 24px; padding: 22px; display: flex; flex-direction: column; gap: 12px; min-height: 180px; justify-content: space-between; }
  .cell.bg-marfil { background: #fff; border: 1.5px solid var(--border-subtle); }
  .cell.bg-azul   { background: var(--vena-azul-noche); color: #fff; }
  .cell.bg-coral  { background: var(--vena-coral-accion); }
  .label { font-family: 'IBM Plex Mono'; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.7; }
  img { max-width: 100%; max-height: 100%; object-fit: contain; }
</style></head>
<body>
  <div class="grid">
    <div class="cell bg-marfil">
      <span class="label">Horizontal · principal</span>
      <img src="../assets/logo-horizontal.png" style="height: 100px; align-self: flex-start;">
    </div>
    <div class="cell bg-azul">
      <span class="label" style="opacity: 0.85;">Sobre azul noche</span>
      <img src="../assets/logo-horizontal.png" style="height: 90px; align-self: flex-start;">
    </div>
    <div class="cell bg-coral">
      <span class="label" style="color: #fff; opacity: 0.9;">Favicon · isotipo</span>
      <img src="../assets/favicon.png" style="height: 110px; align-self: flex-start;">
    </div>
  </div>
</body>
</html>
