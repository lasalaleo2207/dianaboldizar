<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Type — Mono accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; background: var(--vena-marfil-digital); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .pill { display: inline-flex; padding: 6px 14px; border-radius: 999px; font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
  .eyebrow { font-family: var(--font-mono); font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--vena-coral-accion); display: inline-flex; align-items: center; gap: 10px; }
  .eyebrow::before { content:''; width:9px; height:9px; border-radius:50%; border:2px solid var(--vena-coral-accion); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-left: auto; }
</style></head>
<body>
  <div class="stack">
    <div class="row"><span class="eyebrow">PORTADA</span><span class="meta">Plex Mono · 13 · 0.12em</span></div>
    <div class="row">
      <span class="pill" style="background:rgba(255,107,94,0.12); color:#FF6B5E">PROMPT LISTO</span>
      <span class="pill" style="background:rgba(10,33,66,0.08); color:#0A2142">NEGOCIO REAL</span>
      <span class="pill" style="background:rgba(245,201,53,0.20); color:#0A2142">IA SIN DRAMA</span>
      <span class="meta">Plex Mono · 12 · SemiBold</span>
    </div>
  </div>
</body></html>
