<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Card example</title>
<link rel="stylesheet" href="../ui_kits/shared/components.css">
<style>
  body { padding: 22px; background: var(--vena-marfil-digital); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { padding: 22px; }
  .card-title { font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--vena-azul-noche); margin-bottom: 6px; }
  .card-body  { font-family: var(--font-body); font-size: 14px; color: var(--fg-secondary); line-height: 1.5; }
  .card-cta   { margin-top: 16px; font-family: var(--font-body); font-weight: 700; font-size: 14px; color: var(--vena-coral-accion); display: inline-flex; gap: 6px; align-items: center; }
  .badge { display: inline-flex; width: 36px; height: 36px; border-radius: 50%; background: var(--vena-coral-12); color: var(--vena-coral-accion); align-items: center; justify-content: center; margin-bottom: 12px; }
  .progress-card { display: flex; flex-direction: column; gap: 10px; }
  .progress-card .h { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .progress-card .v { font-family: var(--font-display); font-size: 36px; font-weight: 800; color: var(--vena-azul-noche); }
</style></head>
<body>
  <div class="grid">
    <div class="card">
      <div class="badge"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div>
      <div class="card-title">Negocio real</div>
      <div class="card-body">Genera estrategia y acciones con IA adaptadas a tu negocio.</div>
      <a class="card-cta">Explorar →</a>
    </div>
    <div class="card progress-card">
      <span class="h">Progreso semanal</span>
      <span class="v">72%</span>
      <div class="progress"><div class="bar" style="width:72%"></div></div>
    </div>
  </div>
</body></html>
