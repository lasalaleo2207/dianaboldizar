<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Colors — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--vena-marfil-digital); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .swatch { display: flex; flex-direction: column; gap: 8px; }
  .chip { width: 100%; aspect-ratio: 1.05/1; border-radius: 18px; border: 1.5px solid rgba(10,33,66,0.06); }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--vena-azul-noche); line-height: 1.2; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); letter-spacing: 0.04em; }
</style></head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#0A2142"></div><div class="name">Azul noche</div><div class="hex">#0A2142</div></div>
    <div class="swatch"><div class="chip" style="background:#FF6B5E"></div><div class="name">Coral acción</div><div class="hex">#FF6B5E</div></div>
    <div class="swatch"><div class="chip" style="background:#F5C935"></div><div class="name">Amarillo energía</div><div class="hex">#F5C935</div></div>
    <div class="swatch"><div class="chip" style="background:#F7F5EF"></div><div class="name">Marfil digital</div><div class="hex">#F7F5EF</div></div>
    <div class="swatch"><div class="chip" style="background:#ECE9E2"></div><div class="name">Gris niebla</div><div class="hex">#ECE9E2</div></div>
    <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><div class="name">Blanco interfaz</div><div class="hex">#FFFFFF</div></div>
  </div>
</body></html>
