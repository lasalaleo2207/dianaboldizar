  .group { background: #fff; border: 1.5px solid var(--border-subtle); border-radius: 18px; padding: 14px 16px; }

  .icons { display: flex; gap: 18px; align-items: center; color: var(--vena-azul-noche); }
  .icons.brand { color: var(--vena-coral-accion); }
  .icons svg { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
