<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Color usage</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--vena-marfil-digital); }
  .row { display: flex; height: 64px; border-radius: 12px; overflow: hidden; box-shadow: inset 0 0 0 1.5px rgba(10,33,66,0.06); }
  .seg { display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: 0.06em; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px 22px; margin-top: 16px; font-family: var(--font-body); font-size: 13px; color: var(--vena-azul-noche); }
  .legend > div { display: flex; align-items: center; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 4px; border: 1px solid rgba(10,33,66,0.08); }
  .rule { margin-top: 18px; padding: 14px 18px; border: 1.5px solid var(--border-subtle); border-radius: 16px; font-family: var(--font-body); color: var(--vena-azul-noche); font-size: 14px; line-height: 1.5; background: #fff; }
  .rule b { color: var(--vena-coral-accion); }
</style></head>
<body>
  <div class="row">
    <div class="seg" style="flex:50; background:#F7F5EF; color:#0A2142">Neutrales · 50%</div>
    <div class="seg" style="flex:22; background:#0A2142; color:#fff">Azul · 22%</div>
    <div class="seg" style="flex:14; background:#FF6B5E; color:#fff">Coral · 14%</div>
    <div class="seg" style="flex:8;  background:#F5C935; color:#0A2142">Am · 8%</div>
    <div class="seg" style="flex:6;  background:#BFD7EA; color:#0A2142">6%</div>
  </div>
  <div class="rule"><b>El azul estructura.</b> El coral activa. El amarillo aporta energía. Los fondos claros mantienen cercanía y legibilidad.</div>
</body></html>
