<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Type — Display scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; background: var(--vena-marfil-digital); }
  .row { display: grid; grid-template-columns: 64px 1fr auto; align-items: baseline; gap: 18px; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: 0; }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; color: var(--vena-coral-accion); text-transform: uppercase; }
  .specimen { font-family: var(--font-display); color: var(--vena-azul-noche); letter-spacing: -0.02em; line-height: 1.05; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
</style></head>
<body>
  <div class="row"><div class="label">H1</div><div class="specimen" style="font-size:48px; font-weight:800">Brand Kit</div><div class="meta">56 · Bold</div></div>
  <div class="row"><div class="label">H2</div><div class="specimen" style="font-size:30px; font-weight:700">Sistema tipográfico</div><div class="meta">32 · Bold</div></div>
  <div class="row"><div class="label">H3</div><div class="specimen" style="font-size:22px; font-weight:600">Paleta principal</div><div class="meta">24 · SemiBold</div></div>
</body></html>
