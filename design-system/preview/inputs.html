<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../ui_kits/shared/components.css">
<style>
  body { padding: 24px; background: var(--vena-marfil-digital); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .field { display: block; }
  .input.focused { border-color: var(--vena-azul-noche); box-shadow: 0 0 0 4px var(--vena-azul-noche-08); }
</style></head>
<body>
  <div class="field">
    <span class="label">Default</span>
    <label class="input"><svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input style="border:0;background:transparent;outline:0;width:100%;font:inherit;color:inherit" placeholder="Busca un negocio…"></label>
  </div>
  <div class="field">
    <span class="label">Focused</span>
    <label class="input focused"><input style="border:0;background:transparent;outline:0;width:100%;font:inherit;color:inherit" value="Escribe tu idea…"></label>
  </div>
  <div class="field">
    <span class="label">Select</span>
    <label class="input"><span style="flex:1;color:var(--fg-muted)">Selecciona una opción</span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></label>
  </div>
  <div class="field">
    <span class="label">Date</span>
    <label class="input"><span style="flex:1;color:var(--fg-muted)">dd / mm / aaaa</span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></label>
  </div>
</body></html>
