<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Type — Body & caption</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; background: var(--vena-marfil-digital); }
  .row { display: grid; grid-template-columns: 80px 1fr auto; align-items: baseline; gap: 18px; padding: 12px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: 0; }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; color: var(--vena-coral-accion); text-transform: uppercase; }
  .specimen { color: var(--vena-azul-noche); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
</style></head>
<body>
  <div class="row"><div class="label">Body</div><div class="specimen" style="font-family:var(--font-body); font-size:16px; font-weight:400; line-height:1.5">IA práctica que funciona para negocios reales. Clara, ingeniosa y sin drama técnico.</div><div class="meta">DM Sans · 16 · Reg</div></div>
  <div class="row"><div class="label">Body / med</div><div class="specimen" style="font-family:var(--font-body); font-size:16px; font-weight:500; line-height:1.5">Tecnología sin drama técnico, pensada para emprendedores reales.</div><div class="meta">DM Sans · 16 · Med</div></div>
  <div class="row"><div class="label">Caption</div><div class="specimen" style="font-family:var(--font-body); font-size:12px; font-weight:500; color:var(--fg-muted)">Página 4 de 12 · Vena Digital</div><div class="meta">DM Sans · 12 · Med</div></div>
</body></html>
