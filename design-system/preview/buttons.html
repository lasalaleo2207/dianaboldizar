<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../ui_kits/shared/components.css">
<style>
  body { padding: 28px; background: var(--vena-marfil-digital); display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); letter-spacing: 0.1em; text-transform: uppercase; min-width: 90px; align-self: center; }
  .group { display: flex; align-items: center; gap: 18px; }
</style></head>
<body>
  <div class="group"><span class="label">Primary</span>
    <button class="btn btn-primary">Quiero un sistema</button>
    <button class="btn btn-primary">Negocio real</button>
  </div>
  <div class="group"><span class="label">Secondary</span>
    <button class="btn btn-secondary">Prompt listo</button>
    <button class="btn btn-secondary">Ver academia</button>
  </div>
  <div class="group"><span class="label">Tertiary</span>
    <button class="btn btn-tertiary">Ver más →</button>
    <button class="btn btn-tertiary">Cancelar</button>
  </div>
  <div class="group"><span class="label">Highlight</span>
    <button class="btn btn-highlight">IA sin drama</button>
    <button class="btn btn-highlight">Copiar prompt</button>
  </div>
</body></html>
