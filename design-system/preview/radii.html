<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--vena-marfil-digital); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .shape { width: 100%; aspect-ratio: 1.3/1; background: #fff; border: 1.5px solid var(--border-subtle); }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--vena-azul-noche); text-align: center; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="shape" style="border-radius:8px"></div><div class="name">Sm</div><div class="meta">8 px</div></div>
    <div class="item"><div class="shape" style="border-radius:16px"></div><div class="name">Input</div><div class="meta">16 px</div></div>
    <div class="item"><div class="shape" style="border-radius:24px"></div><div class="name">Card</div><div class="meta">24 px</div></div>
    <div class="item"><div class="shape" style="border-radius:32px"></div><div class="name">Container</div><div class="meta">32 px</div></div>
    <div class="item"><div class="shape" style="border-radius:999px"></div><div class="name">Pill</div><div class="meta">999 px</div></div>
  </div>
</body></html>
